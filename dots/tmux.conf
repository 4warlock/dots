set -g prefix C-SPACE
set -g base-index 1
set -g renumber-windows on
set -g mode-keys vi
set -g status-position top
set -g status-justify absolute-centre
set -g status-style "bg=default bold"
set -g window-status-current-style "fg=red bold"
set -g status-left "#S"
set -g status-right ""

# Fuzzy finder for all directories
bind-key -r f run-shell "tmux neww ~/.local/bin/tmux-sessionizer"
bind-key t new-window
bind-key Tab last-window

bind-key -n M-1 select-window -t 1
bind-key -n M-2 select-window -t 2
bind-key -n M-3 select-window -t 3
bind-key -n M-4 select-window -t 4
bind-key -n M-5 select-window -t 5
bind-key -n M-6 select-window -t 6
bind-key -n M-7 select-window -t 7
bind-key -n M-8 select-window -t 8
bind-key -n M-9 select-window -t 9

# Quick jumps to specific directories (no 'neww' wrapper needed)
bind l run-shell "~/.local/bin/tmux-sessionizer $HOME/notes"
bind k run-shell "~/.local/bin/tmux-sessionizer $HOME/python"
bind j run-shell "~/.local/bin/tmux-sessionizer $HOME/java"
bind h run-shell "~/.local/bin/tmux-sessionizer $HOME"
bind c run-shell "~/.local/bin/tmux-sessionizer $HOME/.config"
